# render.yaml
services:
  - type: web
    name: slds-backend
    runtime: python
    repo: https://github.com/UWINTWALI/slds
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        sync: false  # Set this manually in the dashboard
      # Add any other environment variables your app needs
      # - key: DATABASE_URL
      #   sync: false
      # - key: SECRET_KEY
      #   sync: false